#### Minimal Debian Preseed Configuration
#### Based on: https://www.debian.org/releases/stable/example-preseed.txt
#### For automated Debian 13 (Trixie) installation
#### Minimal setup - bootstrap script handles the rest
####
#### Usage:
####   Boot from Debian installer with boot parameters:
####   auto url=http://yourserver/debian-preseed-minimal.cfg
####
#### WARNING: This file is PUBLIC on GitHub!
####          Default password is "debian123" - CHANGE IMMEDIATELY after install!
####          Or use custom preseed with your own password hash
####
#### Documentation: https://wiki.debian.org/DebianInstaller/Preseed

### Localization
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

### Network configuration
# Disable network config in preseed (it's already configured to get the preseed file)
# Use DHCP by default
d-i netcfg/choose_interface select auto

# Hostname and domain
d-i netcfg/get_hostname string debian-new
d-i netcfg/get_domain string

# Disable WEP key dialog if using wireless
d-i netcfg/wireless_wep string

### Mirror settings
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

### Account setup
# Root account
d-i passwd/root-login boolean true
# Root password (plaintext): "debian123"
# WARNING: This is PUBLIC - change immediately after install!
d-i passwd/root-password password debian123
d-i passwd/root-password-again password debian123

# Skip creation of a normal user account (bootstrap script creates ansible user)
d-i passwd/make-user boolean false

### Clock and time zone setup
d-i clock-setup/utc boolean true
d-i time/zone string Europe/Oslo
d-i clock-setup/ntp boolean true

### Partitioning
# Use regular (non-LVM) partitioning for simplicity
d-i partman-auto/method string regular

# Choose entire disk
d-i partman-auto/disk string /dev/sda /dev/vda /dev/nvme0n1
d-i partman-auto/choose_recipe select atomic

# Confirm partitioning
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### Base system installation
d-i base-installer/kernel/image string linux-image-amd64

### Apt setup
d-i apt-setup/non-free-firmware boolean true
d-i apt-setup/non-free boolean true
d-i apt-setup/contrib boolean true
d-i apt-setup/services-select multiselect security, updates
d-i apt-setup/security_host string security.debian.org

### Package selection
tasksel tasksel/first multiselect standard, ssh-server

# Minimal packages - bootstrap script installs the rest
d-i pkgsel/include string openssh-server sudo python3

# No automatic updates (we handle this via Ansible)
d-i pkgsel/upgrade select none

# Disable popularity contest
popularity-contest popularity-contest/participate boolean false

### Boot loader installation
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true
d-i grub-installer/bootdev string default

### Finishing up the installation
# Avoid the "installation complete" message
d-i finish-install/reboot_in_progress note

### Preseeding other packages
# Enable root SSH login and password authentication
d-i preseed/late_command string \
    in-target sed -i 's/^#*PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config; \
    in-target sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config;
